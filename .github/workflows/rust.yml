name: Rust CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SCCACHE_DIR: /tmp/sccache
  SCCACHE_CACHE_SIZE: 2G

jobs:
  ci:
    name: Clippy & Test
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup sccache
        run: |
          SCCACHE_VER="v0.9.1"
          INSTALL_DIR="${HOME}/.cargo/bin"
          mkdir -p "${INSTALL_DIR}"
          if ! command -v sccache &> /dev/null; then
            echo "Downloading sccache ${SCCACHE_VER}..."
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VER}/sccache-${SCCACHE_VER}-x86_64-unknown-linux-musl.tar.gz" \
              | tar xz --strip-components=1 -C "${INSTALL_DIR}" "sccache-${SCCACHE_VER}-x86_64-unknown-linux-musl/sccache"
            chmod +x "${INSTALL_DIR}/sccache"
          fi
          sccache --version

      - name: Cache (cargo registry + sccache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            /tmp/sccache
          key: ${{ runner.os }}-sccache-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-sccache-

      - name: Check Rust version
        run: rustc --version && cargo --version

      # test 先跑（完整 codegen），clippy 再跑（重用 sccache 產物）
      - name: Test
        run: cargo test
        env:
          RUSTC_WRAPPER: sccache

      - name: Clippy
        run: cargo clippy -- -D warnings
        env:
          RUSTC_WRAPPER: sccache

      - name: sccache stats
        if: always()
        run: sccache --show-stats || true
