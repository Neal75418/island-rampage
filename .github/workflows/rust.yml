name: Rust CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    name: Clippy & Test
    runs-on: [self-hosted, linux]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Cleanup disk space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /
          cargo clean 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Override opt-level for CI
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'TOML'
          [profile.dev]
          opt-level = 0

          [profile.dev.package."*"]
          opt-level = 0
          TOML

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test 2>&1
