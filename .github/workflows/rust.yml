name: Rust CI

on:
  workflow_dispatch:  # 允許手動觸發
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Rust version
        run: rustc --version && cargo --version

      # Clippy 先跑 - 編譯 + lint 檢查，失敗就提早終止
      - name: Clippy
        run: cargo clippy -- -D warnings

      # Clippy 通過後，build 會用 cache 很快
      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
