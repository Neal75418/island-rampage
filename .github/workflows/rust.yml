name: Rust CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: 2

jobs:
  ci:
    name: Clippy & Test
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Override opt-level for CI
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'TOML'
          [profile.dev]
          opt-level = 1

          [profile.dev.package."*"]
          opt-level = 1
          TOML
          cat .cargo/config.toml

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test 2>&1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
